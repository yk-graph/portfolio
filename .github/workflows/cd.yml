name: CD

on:
  push:
    branches:
      - staging
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build & push images
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve image tag
        id: meta
        run: echo "tag=${{ github.ref_name == 'main' && 'latest' || 'staging' }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ghcr.io/yk-graph/portfolio-web:${{ steps.meta.outputs.tag }}
          build-args: |
            NOTION_TOKEN=${{ secrets.NOTION_TOKEN }}
            NOTION_WORKS_DATA_SOURCE_ID=${{ secrets.NOTION_WORKS_DATA_SOURCE_ID }}
            NOTION_NOTES_DATA_SOURCE_ID=${{ secrets.NOTION_NOTES_DATA_SOURCE_ID }}
            R2_ACCOUNT_ID=${{ secrets.R2_ACCOUNT_ID }}
            R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}
            R2_SECRET_ACCESS_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }}
            R2_BUCKET=${{ secrets.R2_BUCKET }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push storybook
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/storybook/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ghcr.io/yk-graph/portfolio-storybook:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Mac mini
    needs: build
    runs-on: [self-hosted, macOS, ARM64]

    steps:
      - name: Deploy
        run: |
          cd ~/server/srv/portfolio
          git fetch origin

          if [ "${{ github.ref_name }}" = "staging" ]; then
            git switch staging
            git pull origin staging
            docker compose -f docker-compose.stg.yml pull
            docker compose -f docker-compose.stg.yml up -d
          elif [ "${{ github.ref_name }}" = "main" ]; then
            git switch main
            git pull origin main
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
          fi

      - name: Clean up dangling images
        run: docker image prune -f
