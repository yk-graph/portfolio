  react-dom: ^19.2.0
  typescript: ^5.7.0
  '@types/react': ^19.2.0
  '@types/react-dom': ^19.2.0
  '@types/node': ^24.0.0
  tailwindcss: ^4.3.1
  '@tailwindcss/postcss': ^4.3.1
  '@tailwindcss/vite': ^4.3.1
  lucide-react: ^1.21.0
  react-icons: ^5.4.0
  next-themes: ^0.4.6

allowBuilds:
  esbuild: true
  sharp: true
  unrs-resolver: true

minimumReleaseAgeExclude:
  - playwright-core@1.61.1
  - playwright@1.61.1
